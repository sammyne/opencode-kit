name: Release

on:
  push:
    tags:
      - "**"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Package agents and skills
        run: tar -czf opencode-kit-${{ github.ref_name }}.tgz .opencode/agents .opencode/skills

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: opencode-kit-${{ github.ref_name }}.tgz
